name: ai-manifesto-dev

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_FILE: /data/manifesto.sqlite
      APP_BASE_URL: http://localhost:8080
      PRIVACY_POLICY_URL: https://p2enjoy.studio/privacy/politique-confidentialite
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_REQUIRE_AUTH: "false"
      SMTP_FROM: Manifesto IA <noreply@manifesto.local>
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_MAGIC_LINK_TTL_MINUTES: ${ADMIN_MAGIC_LINK_TTL_MINUTES:-15}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME:-manifesto_admin_session}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev --workspace server
    working_dir: /app
    volumes:
      - ./apps/server:/app/apps/server
      - ./data:/data
    ports:
      - "3001:3001"
    depends_on:
      - mailpit

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://server:3001
    command: npm run dev --workspace client
    working_dir: /app
    volumes:
      - ./apps/client:/app/apps/client
    ports:
      - "8080:5173"
    depends_on:
      - server

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
