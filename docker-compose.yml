services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_FILE: /data/manifesto.sqlite
      APP_BASE_URL: http://localhost:8080
      PRIVACY_POLICY_URL: https://p2enjoy.studio/privacy/politique-confidentialite
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: Manifesto IA <noreply@manifesto.local>
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_MAGIC_LINK_TTL_MINUTES: ${ADMIN_MAGIC_LINK_TTL_MINUTES:-15}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME:-manifesto_admin_session}
    volumes:
      - ./data:/data
    ports:
      - "3001:3001"
    depends_on:
      - mailpit

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: production
    ports:
      - "8080:80"
    depends_on:
      - server

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
