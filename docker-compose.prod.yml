name: ai-manifesto-prod

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_FILE: /data/manifesto.sqlite
      APP_BASE_URL: https://manifesto-ia.org
      PRIVACY_POLICY_URL: https://p2enjoy.studio/privacy/politique-confidentialite
      SMTP_HOST: smtp.tem.scaleway.com
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_REQUIRE_AUTH: ${SMTP_REQUIRE_AUTH:-true}
      SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-15000}
      SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-15000}
      SMTP_SOCKET_TIMEOUT_MS: ${SMTP_SOCKET_TIMEOUT_MS:-20000}
      SMTP_DNS_TIMEOUT_MS: ${SMTP_DNS_TIMEOUT_MS:-10000}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:-Manifesto IA <noreply@manifesto-ia.org>}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_MAGIC_LINK_TTL_MINUTES: ${ADMIN_MAGIC_LINK_TTL_MINUTES:-15}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME:-manifesto_admin_session}
    volumes:
      - ./data:/data
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      target: production
    depends_on:
      - server
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
